workflows:
  android-workflow:
    name: FLICK Android Build
    max_build_duration: 60
    environment:
      node: 20.14.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci --legacy-peer-deps
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
